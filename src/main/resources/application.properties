spring.application.name=ShopSphere

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/shopsphere?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===== Server =====
server.port=8080

# ===== JWT =====
# NOTE: keep this secret long (>= 64 chars for HS512). Move to env var in production.
app.jwt.secret=ShopSphereSuperSecretKeyChangeMeInProductionEnvironment1234567890ABCDEF
app.jwt.expiration-ms=86400000

# ===== CORS (frontend origin) =====
app.cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000
