<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Shop the latest products in electronics, fashion, and books on ShopSphere - Your modern e-commerce destination.">
    <title>ShopSphere — E-Commerce Storefront</title>
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- Shared Navigation Bar -->
    <header id="navbar-container"></header>

    <!-- Main Content Area -->
    <main class="container">
        <div class="catalog-container">
            
            <!-- Category Sidebar Filter -->
            <aside class="catalog-sidebar">
                <h4 class="sidebar-title">Categories</h4>
                <div id="category-list" class="category-list">
                    <!-- Categories will be dynamically loaded here -->
                </div>
            </aside>
            
            <!-- Catalog Main Panel -->
            <section class="catalog-main">
                
                <!-- Search & Filters Header -->
                <div class="search-bar-container">
                    <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="20" height="20">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.637 10.637z" />
                    </svg>
                    <input type="text" id="search-input" class="form-control search-input" placeholder="Search for products, brands or models...">
                </div>
                
                <!-- Product Grid -->
                <div id="product-grid" class="product-grid">
                    <!-- Products or skeletons will be loaded here -->
                </div>

                <!-- Empty State -->
                <div id="empty-catalog-state" class="empty-state" style="display: none;">
                    <div class="empty-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="64" height="64">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15.182 16.318A4.486 4.486 0 0012.016 15a4.486 4.486 0 00-3.197 1.318M21 12a9 9 0 11-18 0 9 9 0 0118 0zM9.75 9.75c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75zm-.375 0h.008v.015h-.008V9.75zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75zm-.375 0h.008v.015h-.008V9.75z" />
                        </svg>
                    </div>
                    <h3 class="empty-title">No products found</h3>
                    <p class="empty-desc">We couldn't find any products matching your search or category selection. Try refining your keywords.</p>
                    <button id="reset-filters-btn" class="btn btn-primary">View All Products</button>
                </div>
                
            </section>
        </div>
    </main>

    <!-- Main JavaScript Logic -->
    <script type="module" src="js/catalog.js"></script>
</body>
</html>
